<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - NexGen Exam Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-indigo-900 to-purple-900 text-white flex flex-col">
      <div class="p-6">
        <h1 class="text-2xl font-bold">NexGen Admin</h1>
        <p class="text-indigo-200 text-sm">Exam Control Panel</p>
      </div>
      <nav class="flex-1 px-4 space-y-1" id="sidebarNav">
        <!-- Navigation items populated by JS -->
      </nav>
      <div class="p-4 border-t border-white/20">
        <button id="logoutBtn" class="w-full text-left px-4 py-2 rounded-lg hover:bg-white/10 transition">
          <i class="fas fa-sign-out-alt mr-2"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold text-gray-800" id="pageTitle">Dashboard</h2>
          <p class="text-gray-600 mt-1" id="pageSubtitle">Overview of your exam portal</p>
        </div>
        <div class="flex items-center space-x-4">
          <button id="refreshBtn" class="p-2 rounded-lg hover:bg-gray-200 transition">
            <i class="fas fa-sync-alt text-gray-600"></i>
          </button>
          <a href="https://nexgenaitech.online" target="_blank" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
            Powered by NexGenAiTech
          </a>
        </div>
      </div>

      <!-- Content Container -->
      <div id="contentContainer" class="space-y-6">
        <!-- Dynamic content loaded by JS -->
      </div>
    </main>
  </div>

  <!-- Full-page Form Container (hidden by default) -->
  <div id="fullPageFormContainer" class="hidden fixed inset-0 bg-gray-50 z-30 overflow-y-auto">
    <div class="max-w-4xl mx-auto py-8 px-4">
      <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 id="formTitle" class="text-2xl font-bold text-gray-800">Form Title</h2>
          <button id="closeFormBtn" class="text-gray-500 hover:text-gray-700">
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <div id="formContent"></div>
      </div>
    </div>
  </div>

  <!-- Global Modal (for confirmations and small forms) -->
  <div id="modalOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-gray-800" id="modalTitle">Modal Title</h3>
          <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <div id="modalBody">
          <!-- Modal content -->
        </div>
        <div class="flex justify-end space-x-3 mt-6">
          <button id="modalCancelBtn" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
          <button id="modalConfirmBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm hidden items-center justify-center z-40">
    <div class="bg-white p-6 rounded-2xl shadow-xl">
      <i class="fas fa-spinner fa-spin text-3xl text-indigo-600"></i>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
