<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - NexGen Exam Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-indigo-900 to-purple-900 text-white flex flex-col">
      <div class="p-6">
        <h1 class="text-2xl font-bold">NexGen Student</h1>
        <p class="text-indigo-200 text-sm" id="studentNameDisplay"></p>
      </div>
      <nav class="flex-1 px-4 space-y-1" id="sidebarNav">
        <!-- Navigation populated by JS -->
      </nav>
      <div class="p-4 border-t border-white/20">
        <button id="logoutBtn" class="w-full text-left px-4 py-2 rounded-lg hover:bg-white/10 transition">
          <i class="fas fa-sign-out-alt mr-2"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold text-gray-800" id="pageTitle">Dashboard</h2>
          <p class="text-gray-600 mt-1">Welcome back!</p>
        </div>
        <div class="flex items-center space-x-4">
          <button id="refreshBtn" class="p-2 rounded-lg hover:bg-gray-200 transition">
            <i class="fas fa-sync-alt text-gray-600"></i>
          </button>
          <a href="https://nexgenaitech.online" target="_blank" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
            Powered by NexGenAiTech
          </a>
        </div>
      </div>

      <!-- Content Container -->
      <div id="contentContainer" class="space-y-6">
        <!-- Dynamic content loaded by JS -->
      </div>
    </main>
  </div>

  <!-- Test Interface Modal (Full-screen) -->
  <div id="testModal" class="fixed inset-0 bg-white z-50 hidden overflow-y-auto">
    <div class="min-h-screen">
      <!-- Test interface injected by JS -->
    </div>
  </div>

  <!-- Pause Overlay -->
  <div id="pauseOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-40 hidden items-center justify-center">
    <div class="bg-white p-8 rounded-2xl text-center max-w-md">
      <i class="fas fa-pause-circle text-5xl text-yellow-500 mb-4"></i>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Test Paused</h2>
      <p class="text-gray-600">Your test has been paused by the administrator. Please wait.</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

  <!-- Loading Overlay (will be created dynamically by JS) -->

  <script src="student.js"></script>
</body>
</html>
